<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매왕길드</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='72' font-size='72' text-anchor='middle'%3E%F0%9F%A9%B7%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--s1:#141720;--s2:#1c2030;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#dde1ed;--t2:#8490aa;--t3:#4a5268;
  --blue:#5b8af5;--blue2:#3d6be0;
  --green:#3ecf8e;--red:#f06565;--gold:#f5c842;--purple:#9b7ff5;--teal:#2dd4bf;
  --green-bg:rgba(62,207,142,0.08);--red-bg:rgba(240,101,101,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh}

.nav{background:var(--s1);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:52px;position:sticky;top:0;z-index:50;gap:4px}
.nav-logo{font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;color:#fff;margin-right:20px;white-space:nowrap}
.nav-tab{height:52px;padding:0 14px;display:flex;align-items:center;font-size:13px;color:var(--t2);border:none;background:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.on{color:var(--blue);border-bottom-color:var(--blue)}

.page{display:none;padding:24px;max-width:1200px;margin:0 auto}
.page.on{display:block}

.two-col-grid{display:grid;grid-template-columns:1fr 1fr}

/* 요약 칩 */
.summary-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.chip{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px 16px;min-width:100px}
.chip-label{font-size:11px;color:var(--t3);margin-bottom:5px}
.chip-val{font-family:'Noto Sans KR',sans-serif;font-size:20px;font-weight:700}

/* 결과 테이블 */
.result-panel{background:var(--s1);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.rp-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.rp-title{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.tag-tobul{background:rgba(155,127,245,.15);color:var(--purple);border:1px solid rgba(155,127,245,.28)}
.tag-daehang{background:rgba(45,212,191,.12);color:var(--teal);border:1px solid rgba(45,212,191,.28)}
.tag-boss{background:rgba(245,200,66,.15);color:var(--gold);border:1px solid rgba(245,200,66,.28)}
.tag-suryun{background:rgba(91,138,245,.12);color:var(--blue);border:1px solid rgba(91,138,245,.28)}

.row-head{display:grid;grid-template-columns:58px 52px 1fr 64px 70px;padding:9px 18px;font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border)}
.row{display:grid;grid-template-columns:58px 52px 1fr 64px 70px;border-bottom:1px solid var(--border);transition:background .1s}
.row:last-child{border-bottom:none}
.row:hover{filter:brightness(1.12)}
.row.rpos{background:var(--green-bg);border-left:3px solid var(--green)}
.row.rneg{background:var(--red-bg);border-left:3px solid var(--red)}
.row.rzero{border-left:3px solid transparent}
.cell{padding:11px 18px;display:flex;align-items:center;font-size:13px}
.cell:first-child{padding-left:15px}
.cn{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--t3)}
.cr{font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;color:var(--t2)}
.cr.top3{color:var(--gold)}
.cdiff{font-size:11px;font-family:'Space Grotesk',sans-serif}
.cscore{justify-content:flex-end}
.sv{font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700}
.sv.pos{color:var(--green)}.sv.neg{color:var(--red)}.sv.zero{color:var(--t3)}

/* 공통 버튼 */
.btn{background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn-prim{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-prim:hover{background:var(--blue2);border-color:var(--blue2);color:#fff}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-danger{border-color:rgba(240,101,101,.35);color:var(--red)}
.btn-danger:hover{background:rgba(240,101,101,.1);border-color:var(--red)}
.sec-title{font-size:13px;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.sec-title::before{content:'';width:3px;height:13px;background:var(--blue);border-radius:2px;display:block}

/* 입력 페이지 */
.battle-grid{display:flex;flex-direction:column;gap:12px}
.battle-panel{background:var(--s1);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.panel-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.panel-head:hover{background:rgba(255,255,255,0.02)}
.panel-head-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px}
.panel-head-left{display:flex;align-items:center;gap:8px;flex:1}
.collapse-arrow{font-size:11px;color:var(--t3);transition:transform .2s}
.battle-panel.collapsed .collapse-arrow{transform:rotate(-90deg)}
.battle-panel.collapsed .slots{display:none}
.battle-panel.collapsed .panel-head{border-bottom:none}
.slots{padding:6px 10px}
.score-row{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:7px;border:1px solid transparent;margin-bottom:2px}
.score-row:hover{background:var(--s2);border-color:var(--border)}
.score-row.filled .sr-input{border-color:rgba(91,138,245,.35)}
.sr-rank{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;color:var(--t3);width:26px;text-align:right;flex-shrink:0}
.sr-rank.top3{color:var(--gold)}
.sr-name{font-size:13px;flex:1;min-width:0}
.sr-input{background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:7px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;width:150px;flex-shrink:0}
.sr-input:focus{border-color:var(--blue)}
.sr-crank{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;color:var(--t2);width:38px;text-align:right;flex-shrink:0}
.sr-crank.top3{color:var(--gold)}
.sr-diff{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;width:40px;text-align:right;flex-shrink:0}
.sr-diff.pos{color:var(--green)}.sr-diff.neg{color:var(--red)}.sr-diff.zero{color:var(--t3)}

/* 대결 추가 폼 */
.add-form{background:var(--s1);border:1px solid var(--border);border-radius:11px;padding:18px;margin-bottom:18px;display:none}
.add-form.open{display:block}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:5px}
.flabel{font-size:12px;color:var(--t2)}
.finput,.fsel{background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:7px 12px;border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none}
.finput:focus,.fsel:focus{border-color:var(--blue)}
.fsel option{background:#1c2030}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:15px;width:320px;max-height:76vh;display:flex;flex-direction:column}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:500}
.modal-close{background:none;border:none;color:var(--t2);cursor:pointer;font-size:19px;line-height:1}

/* 멤버 관리 */
.member-table{background:var(--s1);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.mt-head,.mt-row{display:grid;grid-template-columns:56px 1fr 160px;align-items:center;padding:10px 16px;gap:10px}
.mt-head{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border)}
.mt-row{border-bottom:1px solid var(--border);transition:background .1s}
.mt-row:last-child{border-bottom:none}
.mt-row:hover{background:var(--s2)}
.name-edit{background:transparent;border:none;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;width:100%;outline:none}

/* 달력 모달 */
.cal-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;display:none;align-items:center;justify-content:center}
.cal-modal-bg.open{display:flex}
.cal-box{background:var(--s1);border:1px solid var(--border2);border-radius:16px;width:300px;padding:20px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-size:15px;font-weight:600;font-family:"Space Grotesk",sans-serif}
.cal-nav{background:none;border:none;color:var(--t2);cursor:pointer;font-size:18px;padding:4px 8px;border-radius:6px;line-height:1}
.cal-nav:hover{background:var(--s2);color:var(--text)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
.cal-wd{text-align:center;font-size:11px;color:var(--t3);padding:4px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;font-family:"Noto Sans KR",sans-serif;border:none;background:none;color:var(--text);transition:background .1s}
.cal-day:hover{background:var(--s2)}
.cal-day.today{border:1px solid var(--blue);color:var(--blue)}
.cal-day.selected{background:var(--blue);color:#fff}
.cal-day.empty{cursor:default}
.cal-type-row{display:flex;gap:8px;margin-top:16px}
.cal-type-row+.cal-type-row{margin-top:8px}
.cal-type-row:last-of-type{margin-bottom:16px}
.cal-type-btn{flex:1;padding:9px;border-radius:9px;border:1px solid var(--border2);background:var(--s2);color:var(--t2);font-size:13px;font-family:"Noto Sans KR",sans-serif;cursor:pointer;transition:all .15s;font-weight:500}
.cal-type-btn:hover{border-color:var(--blue);color:var(--text)}
.cal-type-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.cal-confirm{width:100%;padding:10px;border-radius:9px;background:var(--blue);border:none;color:#fff;font-size:14px;font-family:"Noto Sans KR",sans-serif;cursor:pointer;font-weight:500}
.cal-confirm:hover{background:var(--blue2)}

/* 토스트 */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--green);color:#061a0e;padding:10px 20px;border-radius:9px;font-weight:500;font-size:13px;opacity:0;transition:all .22s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:640px){
  .page{padding:14px}
  .battle-grid{grid-template-columns:1fr}
  .row-head,.row{grid-template-columns:50px 44px 1fr 60px}
  .hide-m{display:none}
  .mt-head,.mt-row{grid-template-columns:44px 1fr auto}
  .two-col-grid{grid-template-columns:1fr}
  .two-col-grid > div{border-right:none !important}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">🩷 매왕길드</div>
  <button class="nav-tab on" onclick="goPage('dashboard')">📊 현황판</button>
  <button class="nav-tab" onclick="goPage('entry')">✏️ 결과 입력</button>
  <button class="nav-tab" onclick="goPage('members')">👥 길드원</button>
</nav>

<div id="page-dashboard" class="page on"></div>
<div id="page-entry" class="page"></div>
<div id="page-members" class="page"></div>

<!-- 달력 모달 -->
<div class="cal-modal-bg" id="cal-modal-bg" onclick="calBgClick(event)">
  <div class="cal-box">
    <div class="cal-header">
      <button class="cal-nav" onclick="calMove(-1)">&#8249;</button>
      <div class="cal-title" id="cal-title"></div>
      <button class="cal-nav" onclick="calMove(1)">&#8250;</button>
    </div>
    <div class="cal-weekdays">
      <div class="cal-wd" style="color:#f06565">일</div>
      <div class="cal-wd">월</div><div class="cal-wd">화</div><div class="cal-wd">수</div>
      <div class="cal-wd">목</div><div class="cal-wd">금</div>
      <div class="cal-wd" style="color:#5b8af5">토</div>
    </div>
    <div class="cal-days" id="cal-days"></div>
    <div class="cal-type-row">
      <button class="cal-type-btn on" data-type="토벌전" onclick="calSelType('토벌전')">토벌전</button>
      <button class="cal-type-btn" data-type="대항전" onclick="calSelType('대항전')">대항전</button>
    </div>
    <div class="cal-type-row">
      <button class="cal-type-btn" data-type="길드보스" onclick="calSelType('길드보스')">길드보스</button>
      <button class="cal-type-btn" data-type="수련장" onclick="calSelType('수련장')">수련장</button>
    </div>
    <button class="cal-confirm" onclick="calConfirm()">추가</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 길드원 추가 모달 -->
<div class="modal-bg" id="addmember-bg" onclick="if(event.target===this)closeAddMember()">
  <div class="modal" style="width:300px">
    <div class="modal-head">
      <div class="modal-title">길드원 추가</div>
      <button class="modal-close" onclick="closeAddMember()">✕</button>
    </div>
    <div style="padding:16px 20px;display:flex;flex-direction:column;gap:12px">
      <div class="fg">
        <label class="flabel">닉네임</label>
        <input class="finput" id="addm-name" placeholder="닉네임 입력" style="width:100%">
      </div>
      <div class="fg">
        <label class="flabel">투력 순위 (몇 위로 추가할지)</label>
        <input class="finput" id="addm-rank" type="number" placeholder="예: 5 → 5위로 삽입" min="1" style="width:100%">
      </div>
      <div style="font-size:11px;color:var(--t3)">순위 미입력 시 맨 마지막으로 추가됩니다.</div>
    </div>
    <div style="display:flex;gap:8px;padding:0 20px 18px;justify-content:flex-end">
      <button class="btn btn-sm" onclick="closeAddMember()">취소</button>
      <button class="btn btn-sm btn-prim" onclick="confirmAddMember()">추가</button>
    </div>
  </div>
</div>

<!-- 확인 모달 -->
<div class="modal-bg" id="confirm-bg">
  <div class="modal" style="width:300px">
    <div class="modal-head" style="border-bottom:none;padding-bottom:4px">
      <div class="modal-title">⚠️ 삭제 확인</div>
    </div>
    <div id="confirm-msg" style="padding:0 20px 16px;font-size:14px;color:var(--t2);line-height:1.6"></div>
    <div style="display:flex;gap:8px;padding:0 20px 18px;justify-content:flex-end">
      <button class="btn btn-sm" onclick="confirmCancel()">취소</button>
      <button class="btn btn-sm btn-danger" onclick="confirmOk()">삭제</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  STATE  — 주차 개념 없음, battles 플랫 배열
// ══════════════════════════════════════════════
let S = {
  members: [], // 투력순위 = 인덱스+1
  battles: [], // [{id, date, type, scores:{name:rawScoreStr}}]
  currentId: null
};

function seed() {
  S.members = ["도세준","제빙그켬","띵띵띵띵띵띵","제로v","혁빡",
    "별샷","짱득춘","싫은디","솔신","낭심에한방","엔이티알","좋은디",
    "킴서현","G존더코","콩프리다용","클로델","ilrain","디듣",
    "송이주","레몬맛소다","네번째밤","쫜득쿠키","원일짱","응새",
    "크롱v","킴쭈이","댕그랑","쑤수슈퍼노바","지뚜야","북부멋쟁이"];
  S.battles = [
    { id:'b1', date:'07/01', type:'수련장', scores:{
      "혁빡":"2079만 5631","싫은디":"1701만 8103","낭심에한방":"1641만 7008","제빙그켬":"1557만 8796",
      "제로v":"1458만 9468","도세준":"1425만 8055","G존더코":"1310만 6529","별샷":"1272만 4719",
      "띵띵띵띵띵띵":"1264만 1322","원일짱":"1184만 9442","킴서현":"1168만 191","송이주":"1021만 9431",
      "쫜득쿠키":"1011만 5919","짱득춘":"951만 2601","콩프리다용":"947만 3268","ilrain":"941만 5470",
      "좋은디":"941만 4324","디듣":"891만 300","솔신":"889만 4628","엔이티알":"776만 6268",
      "클로델":"754만 6434","크롱v":"631만 7361","레몬맛소다":"554만 2518","쑤수슈퍼노바":"530만 1477",
      "네번째밤":"506만 4372","킴쭈이":"488만 8425","응새":"452만 1162","지뚜야":"397만 3191",
      "댕그랑":"미참여"
    }},
    { id:'b2', date:'07/06', type:'대항전', scores:{
      "제빙그켬":"3794억 9526만","도세준":"2619억 8315만","띵띵띵띵띵띵":"2146억 898만","제로v":"1762억 1036만",
      "혁빡":"1716억 2471만","별샷":"1427억 9885만","싫은디":"1384억 1454만","낭심에한방":"1358억 4352만",
      "솔신":"1261억 8693만","G존더코":"1226억 573만","킴서현":"1178억 260만","좋은디":"1091억 3925만",
      "짱득춘":"1085억 1968만","엔이티알":"899억 3814만","ilrain":"817억 5833만","콩프리다용":"704억 8472만",
      "디듣":"674억 181만","레몬맛소다":"647억 3380만","네번째밤":"632억 9157만","클로델":"623억 6897만",
      "송이주":"613억 4433만","쫜득쿠키":"501억 5630만","원일짱":"453억 9503만","쑤수슈퍼노바":"296억 7031만",
      "응새":"275억 189만","댕그랑":"272억 375만","크롱v":"271억 8597만","지뚜야":"175억 2797만",
      "킴쭈이":"미참여","북부멋쟁이":"참여불가"
    }}
  ];
  S.currentId = 'b2';
}

function save(){try{localStorage.setItem('guild_v5',JSON.stringify(S))}catch(e){}}
function load(){
  try{const d=localStorage.getItem('guild_v5');if(d){S=JSON.parse(d);return}}catch(e){}
  seed();save();
}

// ── helpers ──
function pRank(name){ const i=S.members.indexOf(name); return i===-1?null:i+1; }
function score(contentRank,name){ const p=pRank(name); return p===null?0:p-contentRank; }
function sc(s){ return s>0?'pos':s<0?'neg':'zero'; }
function ss(s){ return s>0?'+'+s:String(s); }
function curBattle(){ return S.battles.find(b=>b.id===S.currentId)||S.battles[0]||null; }
const BATTLE_TYPES = ['토벌전','대항전','길드보스','수련장'];
const TYPE_CLASS = {'토벌전':'tobul','대항전':'daehang','길드보스':'boss','수련장':'suryun'};
function tagCls(type){ return 'tag-'+(TYPE_CLASS[type]||'daehang'); }

// ── 점수 파싱 / 컨텐츠순위 계산 ──
function parseScoreVal(str){
  if(!str) return null;
  const re = /([\d,]+)\s*(억|만)?/g;
  let m, total = 0, matched = false;
  while((m = re.exec(String(str)))){
    const num = parseFloat(m[1].replace(/,/g,''));
    if(isNaN(num)) continue;
    matched = true;
    total += m[2]==='억' ? num*1e8 : m[2]==='만' ? num*1e4 : num;
  }
  return matched ? total : null;
}
function contentRanking(bt){
  const entries = Object.entries(bt.scores||{})
    .map(([name,raw])=>({name,raw,val:parseScoreVal(raw)}))
    .filter(e=>e.val!==null)
    .sort((a,b)=>b.val-a.val);
  entries.forEach((e,i)=>e.rank=i+1);
  return entries;
}

// ══════════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════════
function renderDashboard(){
  const bt = curBattle();
  const curType = bt?.type || BATTLE_TYPES[0];
  const typeOptions = BATTLE_TYPES.map(t=>{
    const cnt = S.battles.filter(b=>b.type===t).length;
    return `<option value="${t}" ${t===curType?'selected':''}>${t} (${cnt}건)</option>`;
  }).join('');
  const battlesOfType = [...S.battles].reverse().filter(b=>b.type===curType);
  const battleOptions = battlesOfType.length
    ? battlesOfType.map(b=>`<option value="${b.id}" ${b.id===S.currentId?'selected':''}>${b.date}</option>`).join('')
    : `<option value="">기록 없음</option>`;

  let body = `<div style="text-align:center;padding:48px;color:var(--t3)">대결을 선택하세요</div>`;

  if(bt){
    const ranked = contentRanking(bt);
    const rankMap = new Map(ranked.map(r=>[r.name,r]));
    const allRows = S.members.map((name,i)=>{
      const rInfo = rankMap.get(name);
      const rRank = rInfo ? rInfo.rank : null;
      return {name, pRank:i+1, rRank, sc: rRank!==null ? score(rRank,name) : null};
    });
    const filled = allRows.filter(r=>r.rRank!==null);
    const pos = filled.filter(r=>r.sc>0).length;
    const neg = filled.filter(r=>r.sc<0).length;
    const zero = filled.filter(r=>r.sc===0).length;
    const maxSc = filled.length?Math.max(...filled.map(r=>r.sc)):0;
    const minSc = filled.length?Math.min(...filled.map(r=>r.sc)):0;
    const mvp  = filled.find(r=>r.sc===maxSc&&maxSc>0);
    const wst  = filled.find(r=>r.sc===minSc&&minSc<0);

    const colHead = `<div class="row-head">
      <div>투력순위</div><div>성과순위</div><div>닉네임</div>
      <div class="hide-m" style="text-align:center">차이</div>
      <div style="text-align:right">점수</div>
    </div>`;
    const makeRow = r => {
      const rowCls = r.sc>0?'rpos':r.sc<0?'rneg':'rzero';
      const diff = r.rRank!==null ? r.pRank-r.rRank : null;
      const diffStr = diff===null?'—':diff>0?`▲${diff}`:diff<0?`▼${Math.abs(diff)}`:'=';
      const diffCol = diff===null?'var(--t3)':diff>0?'var(--green)':diff<0?'var(--red)':'var(--t3)';
      return `<div class="row ${rowCls}">
        <div class="cell" style="font-size:12px;color:var(--text);font-weight:700">${r.pRank}위</div>
        <div class="cell cr${r.rRank&&r.rRank<=3?' top3':''}">${r.rRank?r.rRank+'위':'—'}</div>
        <div class="cell" style="font-size:14px;font-weight:500">${r.name}</div>
        <div class="cell cdiff hide-m" style="color:${diffCol};justify-content:center">${diffStr}</div>
        <div class="cell cscore">${r.sc!==null?`<span class="sv ${sc(r.sc)}">${ss(r.sc)}</span>`:'<span class="sv zero">—</span>'}</div>
      </div>`;
    };
    const left  = allRows.slice(0,15).map(makeRow).join('');
    const right = allRows.slice(15,30).map(makeRow).join('');

    body = `
    <div class="summary-row">
      <div class="chip"><div class="chip-label">플러스</div><div class="chip-val" style="color:var(--green)">${pos}명</div></div>
      <div class="chip"><div class="chip-label">유지</div><div class="chip-val" style="color:var(--t2)">${zero}명</div></div>
      <div class="chip"><div class="chip-label">마이너스</div><div class="chip-val" style="color:var(--red)">${neg}명</div></div>
      ${mvp?`<div class="chip"><div class="chip-label">MVP</div>
        <div class="chip-val" style="color:var(--gold);font-size:15px;padding-top:2px">${mvp.name}</div>
        <div style="font-size:11px;color:var(--t3);margin-top:3px">+${maxSc}점</div></div>`:''}
      ${wst?`<div class="chip"><div class="chip-label">최저</div>
        <div class="chip-val" style="color:var(--red);font-size:15px;padding-top:2px">${wst.name}</div>
        <div style="font-size:11px;color:var(--t3);margin-top:3px">${minSc}점</div></div>`:''}
    </div>
    <div class="result-panel">
      <div class="rp-head">
        <div class="rp-title"><span class="tag ${tagCls(bt.type)}">${bt.type}</span>${bt.date} 결과</div>
        <div style="font-size:12px;color:var(--t3)">${filled.length}/${S.members.length}</div>
      </div>
      <div class="two-col-grid">
        <div style="border-right:1px solid var(--border)">${colHead}${left}</div>
        <div>${colHead}${right}</div>
      </div>
    </div>`;
  }

  document.getElementById('page-dashboard').innerHTML = `
    <div style="display:flex;gap:10px;margin-bottom:22px;align-items:center;flex-wrap:wrap">
      <div class="fg" style="flex:1;max-width:160px">
        <label class="flabel">대전 선택</label>
        <select class="fsel" style="width:100%" onchange="dashTypeChange(this.value)">${typeOptions}</select>
      </div>
      <div class="fg" style="flex:1;max-width:160px">
        <label class="flabel">대전 기록</label>
        <select class="fsel" style="width:100%" onchange="selBattle(this.value)">${battleOptions}</select>
      </div>
    </div>
    ${body}`;
}

function selBattle(id){ if(!id) return; S.currentId=id; save(); renderDashboard(); }
function dashTypeChange(type){
  const latest = [...S.battles].reverse().find(b=>b.type===type);
  S.currentId = latest?.id || null;
  save(); renderDashboard();
}

// ══════════════════════════════════════════════
//  ENTRY PAGE
// ══════════════════════════════════════════════
let openPanels = new Set(); // 펼쳐진 패널 ID 기억

function renderEntryPage(){
  const panels = [...S.battles].reverse().map(bt=>{
    const tCls = tagCls(bt.type);
    const ranked = contentRanking(bt);
    const rankMap = new Map(ranked.map(r=>[r.name,r.rank]));
    const rows = S.members.map((name,i)=>{
      const pr = i+1;
      const raw = (bt.scores && bt.scores[name]) || '';
      const crank = rankMap.get(name);
      const s = crank ? score(crank,name) : null;
      return `<div class="score-row${raw?' filled':''}">
        <div class="sr-rank${pr<=3?' top3':''}">${pr}</div>
        <div class="sr-name">${name}</div>
        <input class="sr-input" value="${raw.replace(/"/g,'&quot;')}" placeholder="점수 입력 (예: 100억 2000만)" onchange="setScore('${bt.id}','${name}',this.value)">
        <div class="sr-crank${crank&&crank<=3?' top3':''}">${crank?crank+'위':'-'}</div>
        <div class="sr-diff${s===null?'':' '+sc(s)}">${s===null?'':ss(s)}</div>
      </div>`;
    }).join('');
    const isOpen = openPanels.has(bt.id);
    return `<div class="battle-panel${isOpen?'':' collapsed'}" id="panel-${bt.id}">
      <div class="panel-head" onclick="togglePanel('${bt.id}')">
        <div class="panel-head-left">
          <span class="collapse-arrow">▼</span>
          <div class="panel-head-title"><span class="tag ${tCls}">${bt.type}</span>${bt.date}</div>
          <span style="font-size:11px;color:var(--t3)">${ranked.length}/${S.members.length}</span>
        </div>
        <button class="btn btn-sm btn-danger" onclick="deleteBattle(event,'${bt.id}','${bt.date}','${bt.type}')">삭제</button>
      </div>
      <div class="slots">${rows}</div>
    </div>`;
  }).join('');

  document.getElementById('page-entry').innerHTML = `
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:18px;flex-wrap:wrap">
      <div class="sec-title" style="margin:0">대결 결과 입력</div>
      <button class="btn btn-sm btn-prim" onclick="openCalModal()">+ 대결 추가</button>
    </div>

    ${S.battles.length===0
      ?'<div style="text-align:center;padding:48px;color:var(--t3)">대결을 추가해주세요</div>'
      :`<div class="battle-grid">${panels}</div>`}`;
}

function setScore(bid,name,val){
  const bt = S.battles.find(b=>b.id===bid); if(!bt) return;
  if(!bt.scores) bt.scores = {};
  val = val.trim();
  if(val) bt.scores[name] = val; else delete bt.scores[name];
  save(); renderEntryPage();
}

function togglePanel(id){
  const el = document.getElementById('panel-'+id);
  if(!el) return;
  const closing = !el.classList.contains('collapsed');
  el.classList.toggle('collapsed');
  if(closing) openPanels.delete(id);
  else openPanels.add(id);
}

// ── 달력 모달 ──────────────────────────────────
let calState = { year:0, month:0, day:0, type:'토벌전' };
function openCalModal(){
  const now = new Date();
  calState.year = now.getFullYear();
  calState.month = now.getMonth(); // 0-based
  calState.day = 0;
  calState.type = '토벌전';
  calSelType('토벌전');
  renderCal();
  document.getElementById('cal-modal-bg').classList.add('open');
}
function calBgClick(e){ if(e.target===document.getElementById('cal-modal-bg')) document.getElementById('cal-modal-bg').classList.remove('open'); }
function calMove(d){
  calState.month += d;
  if(calState.month < 0){ calState.month=11; calState.year--; }
  if(calState.month > 11){ calState.month=0; calState.year++; }
  calState.day = 0;
  renderCal();
}
function calSelType(t){
  calState.type = t;
  document.querySelectorAll('.cal-type-btn').forEach(b=>b.classList.toggle('on', b.dataset.type===t));
}
function renderCal(){
  const y=calState.year, m=calState.month;
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-title').textContent = y+'년 '+months[m];
  const firstDay = new Date(y,m,1).getDay(); // 0=일
  const daysInMonth = new Date(y,m+1,0).getDate();
  const today = new Date();
  let html = '';
  for(let i=0;i<firstDay;i++) html += '<div class="cal-day empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const isToday = today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
    const isSel = calState.day===d;
    html += `<button class="cal-day${isToday?' today':''}${isSel?' selected':''}" onclick="calPickDay(${d})">${d}</button>`;
  }
  document.getElementById('cal-days').innerHTML = html;
}
function calPickDay(d){
  calState.day = d;
  renderCal();
}
function calConfirm(){
  if(!calState.day){ showToast('날짜를 선택하세요'); return; }
  const mm = String(calState.month+1).padStart(2,'0');
  const dd = String(calState.day).padStart(2,'0');
  const dateStr = mm+'/'+dd;
  const b={id:'b'+Date.now(),date:dateStr,type:calState.type,scores:{}};
  S.battles.push(b); S.currentId=b.id;
  document.getElementById('cal-modal-bg').classList.remove('open');
  openPanels.add(b.id);
  save(); renderEntryPage(); showToast(dateStr+' '+calState.type+' 추가!');
}
function deleteBattle(e,id,date,type){
  e.stopPropagation();
  showConfirm(date+' '+type+' 결과를 삭제할까요?\n입력된 데이터가 모두 사라집니다.', function(){
    S.battles=S.battles.filter(b=>b.id!==id);
    if(S.currentId===id)S.currentId=S.battles[S.battles.length-1]?.id||null;
    save();renderAll();
  });
}
// ══════════════════════════════════════════════
//  MEMBERS
// ══════════════════════════════════════════════
function renderMembersPage(){
  document.getElementById('page-members').innerHTML=`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap">
      <div class="sec-title" style="margin:0">길드원 (순서 = 투력순위)</div>
      <button class="btn btn-prim btn-sm" onclick="saveMembers()">💾 저장</button>
      <button class="btn btn-sm" onclick="addMember()">+ 추가</button>
    </div>
    <div style="font-size:12px;color:var(--t3);margin-bottom:14px">↑↓ 버튼으로 순서 조정 → 투력순위 자동 변경</div>
    <div class="member-table">
      <div class="mt-head"><div>투력순위</div><div>닉네임</div><div>관리</div></div>
      ${S.members.map((n,i)=>`
      <div class="mt-row">
        <div style="font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;color:var(--text)">${i+1}위</div>
        <div><input class="name-edit" value="${n}" id="mn-${i}" onblur="upName(${i},this.value)"></div>
        <div style="display:flex;gap:5px">
          <button class="btn btn-sm" onclick="moveM(${i},-1)" ${i===0?'disabled':''}>↑</button>
          <button class="btn btn-sm" onclick="moveM(${i},1)" ${i===S.members.length-1?'disabled':''}>↓</button>
          <button class="btn btn-sm btn-danger" onclick="removeM(${i})">삭제</button>
        </div>
      </div>`).join('')}
    </div>`;
}
function saveMembers(){save();showToast('저장 완료 ✓');renderAll()}
function upName(i,v){if(v.trim())S.members[i]=v.trim()}
function moveM(i,d){
  const ni=i+d;if(ni<0||ni>=S.members.length)return;
  [S.members[i],S.members[ni]]=[S.members[ni],S.members[i]];
  save();renderMembersPage();
}
function addMember(){
  document.getElementById('addm-name').value='';
  document.getElementById('addm-rank').value='';
  document.getElementById('addmember-bg').classList.add('open');
  setTimeout(()=>document.getElementById('addm-name').focus(),50);
}
function closeAddMember(){
  document.getElementById('addmember-bg').classList.remove('open');
}
function confirmAddMember(){
  const name=document.getElementById('addm-name').value.trim();
  if(!name){showToast('닉네임을 입력하세요');return;}
  const rankVal=parseInt(document.getElementById('addm-rank').value);
  if(rankVal>=1 && rankVal<=S.members.length+1){
    S.members.splice(rankVal-1,0,name);
  } else {
    S.members.push(name);
  }
  closeAddMember();
  save();renderMembersPage();
  showToast(name+' 추가 완료!');
}
function removeM(i){
  showConfirm(S.members[i]+' 길드원을 삭제할까요?', function(){
    S.members.splice(i,1);save();renderMembersPage();
  });
}

// ══════════════════════════════════════════════
//  CONFIRM MODAL
// ══════════════════════════════════════════════
let _confirmCb = null;
function showConfirm(msg, cb){
  _confirmCb = cb;
  document.getElementById('confirm-msg').innerHTML = msg.replace(/\n/g,'<br>');
  document.getElementById('confirm-bg').classList.add('open');
}
function confirmOk(){
  document.getElementById('confirm-bg').classList.remove('open');
  if(_confirmCb){ _confirmCb(); _confirmCb=null; }
}
function confirmCancel(){
  document.getElementById('confirm-bg').classList.remove('open');
  _confirmCb=null;
}

// ══════════════════════════════════════════════
//  NAV + INIT
// ══════════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function goPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  document.querySelectorAll('.nav-tab').forEach(t=>{
    if(t.getAttribute('onclick').includes(name))t.classList.add('on');
  });
  if(name==='dashboard')renderDashboard();
  if(name==='entry')renderEntryPage();
  if(name==='members')renderMembersPage();
}
function renderAll(){
  const cur=document.querySelector('.nav-tab.on')?.getAttribute('onclick').match(/'(\w+)'/)?.[1]||'dashboard';
  goPage(cur);
}

load();renderAll();
</script>
